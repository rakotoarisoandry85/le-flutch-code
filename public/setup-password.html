<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le Flutch — Choisis ton mot de passe</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    :root {
      --primary: #d6336c;
      --primary-dark: #a61e4d;
      --header-bg: #d6336c;
      --header-bg-dark: #c27ab5;
      --white: #FFFFFF;
      --text: #2C3E50;
      --text-light: #7F8C8D;
      --border: #E8E8E8;
      --success: #27AE60;
      --danger: #E74C3C;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--header-bg) 0%, var(--header-bg-dark) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 40px 36px;
      width: 460px;
      max-width: 100%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo img { height: 44px; margin-bottom: 10px; border-radius: 6px; }
    .logo-text { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: 0.5px; }
    .logo-sub { font-size: 13px; color: var(--text-light); margin-top: 4px; }
    h1 { font-size: 18px; color: var(--text); margin-bottom: 6px; text-align: center; }
    .greeting { font-size: 14px; color: var(--text-light); text-align: center; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px; border: 2px solid var(--border);
      border-radius: 10px; font-size: 15px; color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--primary); }
    .btn {
      width: 100%; padding: 14px; background: var(--primary); color: white;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: background 0.2s; margin-top: 8px;
    }
    .btn:hover:not(:disabled) { background: var(--primary-dark); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      padding: 12px 14px; border-radius: 8px; font-size: 14px;
      margin-bottom: 16px; display: none;
    }
    .alert.show { display: block; }
    .alert-error { background: #fce4ed; color: var(--primary-dark); }
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .strength {
      margin-top: 8px; font-size: 12px;
    }
    .strength-bar {
      height: 6px; background: var(--border); border-radius: 4px;
      overflow: hidden; margin-top: 4px;
    }
    .strength-fill {
      height: 100%; width: 0%; transition: width 0.2s, background 0.2s;
      background: var(--danger);
    }
    .rules {
      list-style: none; margin-top: 10px; font-size: 12px; color: var(--text-light);
    }
    .rules li { padding: 2px 0; }
    .rules li.ok { color: var(--success); }
    .rules li i { width: 14px; }
    .center { text-align: center; padding: 30px 0; }
    .center i { font-size: 36px; color: var(--text-light); margin-bottom: 12px; }
    @media (max-width: 480px) {
      .card { padding: 28px 20px; border-radius: 12px; }
      input { padding: 14px; font-size: 16px; min-height: 48px; }
      .btn { padding: 16px; font-size: 17px; min-height: 52px; }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="logo">
      <img src="/favicon.png" alt="Le Flutch">
      <div class="logo-text">LE FLUTCH</div>
      <div class="logo-sub">Activation de ton compte</div>
    </div>
    <div id="loading" class="center">
      <i class="fas fa-spinner fa-spin"></i>
      <div>Vérification du lien…</div>
    </div>
    <div id="invalid" class="center" style="display:none">
      <i class="fas fa-exclamation-triangle" style="color:var(--danger)"></i>
      <h1 style="margin-bottom:8px">Ce lien a expiré</h1>
      <p style="font-size:14px;color:var(--text-light);line-height:1.5">
        Demande à Daniel un nouveau lien d'activation.
      </p>
    </div>
    <div id="form-block" style="display:none">
      <h1>Choisis ton mot de passe</h1>
      <p class="greeting" id="greeting">Bonjour</p>
      <div class="alert alert-error" id="error"></div>
      <form id="setupForm" autocomplete="off">
        <div class="form-group">
          <label>Nouveau mot de passe</label>
          <input type="password" id="password" placeholder="Au moins 10 caractères" required minlength="10" autocomplete="new-password">
          <div class="strength">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          </div>
          <ul class="rules" id="rules">
            <li id="rLen"><i class="far fa-circle"></i> Au moins 10 caractères</li>
            <li id="rLetter"><i class="far fa-circle"></i> Au moins une lettre</li>
            <li id="rDigit"><i class="far fa-circle"></i> Au moins un chiffre</li>
          </ul>
        </div>
        <div class="form-group">
          <label>Confirme le mot de passe</label>
          <input type="password" id="confirm" placeholder="Retape le même mot de passe" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn" id="submitBtn" disabled>Activer mon compte</button>
      </form>
    </div>
    <div id="success" class="center" style="display:none">
      <i class="fas fa-check-circle" style="color:var(--success)"></i>
      <h1 style="margin-bottom:8px">Mot de passe créé</h1>
      <p style="font-size:14px;color:var(--text-light);margin-bottom:20px">Redirection vers la page de connexion…</p>
    </div>
  </div>
  <script>
    var TOKEN = new URLSearchParams(location.search).get('token') || '';

    function show(id) {
      ['loading','invalid','form-block','success'].forEach(function(k) {
        document.getElementById(k).style.display = (k === id) ? 'block' : 'none';
      });
    }

    function checkRules() {
      var p = document.getElementById('password').value;
      var c = document.getElementById('confirm').value;
      var rLen = p.length >= 10;
      var rLetter = /[A-Za-z]/.test(p);
      var rDigit = /\d/.test(p);
      function set(id, ok) {
        var el = document.getElementById(id);
        el.classList.toggle('ok', ok);
        el.querySelector('i').className = ok ? 'fas fa-check-circle' : 'far fa-circle';
      }
      set('rLen', rLen); set('rLetter', rLetter); set('rDigit', rDigit);
      var score = (rLen?1:0) + (rLetter?1:0) + (rDigit?1:0) + (p.length >= 14 ? 1 : 0);
      var pct = Math.min(100, score * 25);
      var fill = document.getElementById('strengthFill');
      fill.style.width = pct + '%';
      fill.style.background = score >= 4 ? 'var(--success)' : score >= 3 ? '#f6c343' : 'var(--danger)';
      var ok = rLen && rLetter && rDigit && p === c && c.length > 0;
      document.getElementById('submitBtn').disabled = !ok;
      return ok;
    }

    document.getElementById('password').addEventListener('input', checkRules);
    document.getElementById('confirm').addEventListener('input', checkRules);

    document.getElementById('setupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      if (!checkRules()) return;
      var p = document.getElementById('password').value;
      var c = document.getElementById('confirm').value;
      var err = document.getElementById('error');
      err.classList.remove('show');
      if (p !== c) {
        err.textContent = 'Les deux mots de passe ne correspondent pas.';
        err.classList.add('show');
        return;
      }
      var btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Activation…';
      try {
        var res = await fetch('/api/setup-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: TOKEN, password: p }),
        });
        var data = await res.json();
        if (!res.ok || !data.success) {
          err.textContent = data.error || 'Erreur lors de l\u2019activation';
          if (data.details && data.details.length) {
            err.textContent = data.details.map(function(d){return d.message;}).join(' · ');
          }
          err.classList.add('show');
          btn.disabled = false; btn.textContent = 'Activer mon compte';
          return;
        }
        try { localStorage.removeItem('auth_token'); } catch(_) {}
        show('success');
        setTimeout(function() {
          location.href = data.redirect || '/login.html?activated=1';
        }, 1500);
      } catch (e2) {
        err.textContent = 'Erreur réseau, réessaie.';
        err.classList.add('show');
        btn.disabled = false; btn.textContent = 'Activer mon compte';
      }
    });

    (async function init() {
      if (!TOKEN || !/^[a-f0-9]{64}$/i.test(TOKEN)) { show('invalid'); return; }
      try {
        var res = await fetch('/api/setup-password/validate?token=' + encodeURIComponent(TOKEN));
        var data = await res.json();
        if (!res.ok || !data.success) { show('invalid'); return; }
        document.getElementById('greeting').textContent = 'Bonjour ' + (data.name || '') + ' (' + data.email + ')';
        show('form-block');
      } catch (_) { show('invalid'); }
    })();
  </script>
</body>
</html>
